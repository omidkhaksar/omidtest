services:
  api:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      RUN_MODE: api
      PORT: 8000
      DATABASE_URL: sqlite:////app/data/house_hunt.db
      DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:8000}
    volumes:
      - house_hunt_data:/app/data
    restart: unless-stopped

  bot:
    build: .
    env_file:
      - .env
    environment:
      RUN_MODE: bot
      DASHBOARD_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped
    profiles:
      - bot

volumes:
  house_hunt_data:
