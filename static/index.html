<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>پیگیری خانه — برد آگهی‌ها</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="ambient" aria-hidden="true">
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="grid-lines"></div>
  </div>

  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="18" width="32" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M20 6L36 18H4L20 6Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="20" cy="24" r="3" fill="currentColor"/>
          </svg>
        </div>
        <div>
          <h1>پیگیری خانه</h1>
          <p class="brand-sub">از دیوار تا کلید در دست</p>
        </div>
      </div>
      <div class="topbar-actions">
        <div class="summary-pill" id="summary">
          <span class="pulse-dot"></span>
          <span class="summary-text">در حال بارگذاری…</span>
        </div>
        <button type="button" class="btn btn-ghost" id="refreshBtn" title="بروزرسانی">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-2.5-6.2"/><path d="M21 3v6h-6"/></svg>
          <span class="btn-label">بروزرسانی</span>
        </button>
        <button type="button" class="btn btn-primary" id="addBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
          <span class="btn-label">افزودن آگهی</span>
        </button>
      </div>
    </header>

    <section class="journey-bar">
      <div class="journey-copy">
        <span class="journey-label">مسیر خرید</span>
        <p class="journey-hint">بکشید بین ستون‌ها · برای جزئیات روی کارت بزنید</p>
      </div>
      <div class="pipeline-stats" id="pipelineStats" aria-label="خلاصه مراحل"></div>
    </section>

    <main class="board-wrap">
      <div class="board" id="board">
        <div class="board-loading" id="boardLoading">
          <div class="loader-ring"></div>
          <span>در حال باز کردن برد…</span>
        </div>
      </div>
    </main>

    <nav class="mobile-tabs" id="mobileTabs" aria-label="مراحل"></nav>
    <button type="button" class="fab" id="fabAdd" aria-label="افزودن آگهی">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </div>

  <div class="modal-backdrop" id="modal" role="dialog" aria-modal="true">
    <div class="modal panel">
      <div class="panel-glow"></div>
      <div class="modal-top">
        <div>
          <p class="eyebrow">آگهی جدید</p>
          <h2 id="modalTitle">افزودن آگهی</h2>
        </div>
        <button type="button" class="icon-btn" id="cancelBtn" aria-label="بستن">✕</button>
      </div>
      <form id="listingForm" class="modal-form">
        <input type="hidden" id="listingId" />
        <div class="modal-preview" id="modalPreview">
          <div class="image-gallery" id="previewGallery"></div>
          <div class="modal-preview-meta" id="previewMeta"></div>
        </div>
        <label class="field">
          <span>لینک دیوار</span>
          <input type="url" id="listingUrl" required placeholder="https://divar.ir/v/..." dir="ltr" />
        </label>
        <label class="field">
          <span>عنوان <em class="hint">خودکار</em></span>
          <input type="text" id="listingTitle" required dir="auto" />
        </label>
        <label class="field">
          <span>مرحله</span>
          <select id="listingStatus"></select>
        </label>
        <label class="field">
          <span>یادداشت شما</span>
          <textarea id="listingNotes" dir="auto" placeholder="شماره تماس، زمان بازدید، دلیل رد…"></textarea>
        </label>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" data-close-modal>انصراف</button>
          <button type="submit" class="btn btn-primary">ذخیره</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-backdrop" id="detailModal" role="dialog" aria-modal="true">
    <div class="modal panel panel-wide">
      <div class="panel-glow"></div>
      <div class="detail-hero" id="detailHero">
        <div class="image-gallery image-gallery-hero" id="detailGallery"></div>
        <div class="hero-fade"></div>
        <button type="button" class="icon-btn icon-btn-overlay" id="detailCloseBtn" aria-label="بستن">✕</button>
      </div>
      <div class="detail-content">
        <div class="detail-head">
          <div>
            <span class="status-pill" id="detailStatusLabel">آگهی</span>
            <h2 id="detailTitle" dir="auto">—</h2>
          </div>
          <div id="detailPriceLocation" class="detail-price-block"></div>
        </div>
        <div class="detail-grid">
          <section class="detail-section glass-inset">
            <h3>مشخصات</h3>
            <div class="specs-grid" id="detailSpecs"></div>
          </section>
          <section class="detail-section glass-inset accent-border">
            <h3>یادداشت پیگیری</h3>
            <div class="notes-box" id="detailNotes">یادداشتی نیست</div>
          </section>
        </div>
        <section class="detail-section glass-inset">
          <h3>توضیحات آگهی</h3>
          <div class="detail-description" id="detailDescription" dir="auto">—</div>
        </section>
        <section class="detail-section" id="detailTagsBlock">
          <h3>برچسب‌ها</h3>
          <div class="tag-list" id="detailTags"></div>
        </section>
        <div class="detail-actions">
          <a class="btn btn-primary" id="detailOpenLink" href="#" target="_blank" rel="noopener">باز کردن در دیوار ↗</a>
          <button type="button" class="btn btn-ghost" id="detailRefreshBtn">↻ بروزرسانی</button>
          <button type="button" class="btn btn-soft" id="detailEditBtn">ویرایش</button>
          <button type="button" class="btn btn-danger-outline" id="detailDeleteBtn">حذف</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
